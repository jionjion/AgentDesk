spring:
  application:
    name: agent-desk
  mvc:
    async:
      request-timeout: 300000
  # JPA 配置
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        default_schema: agent_desk
    show-sql: false
  # 数据库配置
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}?currentSchema=agent_desk&stringtype=unspecified
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

agentscope:
  dashscope:
    api-key: ${DASHSCOPE_API_KEY}
  agent:
    name: assistant

agentdesk:
  # 数据库存储, 不再使用本地文件
  storage: postgresql
