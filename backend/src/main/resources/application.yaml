spring:
  application:
    name: agent-desk
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  mvc:
    async:
      request-timeout: 300000
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 25MB
  # JPA 配置
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        default_schema: agent_desk
    show-sql: false
  # 数据库配置
  datasource:
    driver-class-name: org.postgresql.Driver

agentscope:
  agent:
    name: assistant

# Actuator 配置
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

agentdesk:
  # 数据库存储, 不再使用本地文件
  storage: postgresql
  # JWT 配置
  jwt:
    expiration: 86400000
  # Mem0 长期记忆服务
  mem0:
    base-url: ${MEM0_API_BASE_URL:http://localhost:18090}
    api-key: ${MEM0_API_KEY:}
