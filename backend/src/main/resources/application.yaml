spring:
  application:
    name: agent-desk
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  mvc:
    async:
      request-timeout: 300000
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 25MB
  # JPA 配置
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        default_schema: agent_desk
    show-sql: false
  # 数据库配置
  datasource:
    driver-class-name: org.postgresql.Driver

agentscope:
  agent:
    name: assistant

# Actuator 配置
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

agentdesk:
  # 数据库存储, 不再使用本地文件
  storage: postgresql
  # JWT 配置
  jwt:
    expiration: 86400000
