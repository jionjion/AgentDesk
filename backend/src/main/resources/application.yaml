spring:
  application:
    name: agent-desk
  mvc:
    async:
      request-timeout: 300000
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 25MB
  # JPA 配置
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        default_schema: agent_desk
    show-sql: false
  # 数据库配置
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}?currentSchema=agent_desk&stringtype=unspecified
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

agentscope:
  dashscope:
    api-key: ${DASHSCOPE_API_KEY}
  agent:
    name: assistant

agentdesk:
  # 数据库存储, 不再使用本地文件
  storage: postgresql
  # JWT 配置
  jwt:
    secret: ${JWT_SECRET}
    expiration: 86400000
  # 阿里云 OSS 配置
  oss:
    endpoint: ${OSS_ENDPOINT}
    bucket: ${OSS_BUCKET}
    access-key-id: ${OSS_ACCESS_KEY_ID}
    access-key-secret: ${OSS_ACCESS_KEY_SECRET}
