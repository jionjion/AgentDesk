name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag is on main branch
        shell: bash
        run: |
          if ! git branch -r --contains ${{ github.sha }} | grep -q 'origin/main'; then
            echo "::error::Tag is not on main branch. Only tags on main can trigger a release."
            exit 1
          fi
        working-directory: .

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 3
          shell: bash
          command: cd frontend && npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build Electron app for Windows
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 30
          max_attempts: 3
          shell: bash
          command: cd frontend && npm run build:win

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: frontend/dist/*.exe

      - name: Get release notes
        id: release_notes
        shell: bash
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          NOTES_FILE="releases/${TAG}.md"
          if [ -f "$NOTES_FILE" ]; then
            echo "found=true" >> $GITHUB_OUTPUT
            echo "file=$NOTES_FILE" >> $GITHUB_OUTPUT
          else
            echo "found=false" >> $GITHUB_OUTPUT
          fi
        working-directory: .

      - name: Create GitHub Release (with notes)
        if: steps.release_notes.outputs.found == 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: frontend/dist/*.exe
          body_path: ${{ steps.release_notes.outputs.file }}
          draft: false
          prerelease: false

      - name: Create GitHub Release (auto)
        if: steps.release_notes.outputs.found != 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: frontend/dist/*.exe
          generate_release_notes: true
          draft: false
          prerelease: false

      - name: Generate CHANGELOG.md
        shell: bash
        run: |
          echo "# Changelog" > CHANGELOG.md
          echo "" >> CHANGELOG.md
          for file in $(ls releases/*.md 2>/dev/null | sed 's/.*\/v//' | sed 's/\.md$//' | sort -t. -k1,1nr -k2,2nr -k3,3nr | sed 's|^|releases/v|;s|$|.md|'); do
            cat "$file" >> CHANGELOG.md
            echo "" >> CHANGELOG.md
            echo "---" >> CHANGELOG.md
            echo "" >> CHANGELOG.md
          done
        working-directory: .

      - name: Commit CHANGELOG.md
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout main
          git add CHANGELOG.md
          git diff --cached --quiet && echo "No changes" || git commit -m "docs: update CHANGELOG.md [skip ci]"
          git push origin main
        working-directory: .
